name: Welcome First-Time Contributors

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 **Welcome, and thanks for opening your first PR!**

            We're excited to have you contribute. A few things to help you get started:

            - **Join the community!** Say hello on the [Google Differential Privacy Slack](https://join.slack.com/t/dp-open-source/shared_invite/zt-35hw483tz-nS5YOtGjxCHk3Ek7WiXvlg) — we'd love to hear who you are, what you're working on, and what brought you here.
            - **A maintainer will review your PR shortly.** If you have questions in the meantime, don't hesitate to ask here or on Slack.

            Thanks for contributing to privacy-preserving machine learning! 🔐
