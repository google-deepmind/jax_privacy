# This workflow runs examples daily to ensure they are working properly.
# It was moved out of ci.yml to speed up per-commit CI.
name: examples

on:
  schedule:
    - cron: "0 17 * * *"  # Daily at 09:00 PST (17:00 UTC)
  workflow_dispatch:

jobs:
  examples:
    name: "Examples: Python 3.11 on Linux"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[examples]"
      - name: Run Examples
        run: |
          echo "::group::keras_api_example"
          python examples/keras_api_example.py
          echo "::endgroup::"
          echo "::group::jax_api_example"
          python examples/jax_api_example.py
          echo "::endgroup::"
          echo "::group::dp_logistic_regression"
          python examples/dp_logistic_regression.py
          echo "::endgroup::"
          echo "::group::dp_sgd_transformer"
          python examples/dp_sgd_transformer.py
          echo "::endgroup::"
          echo "::group::dpmf_strategy_optimization"
          python examples/dpmf_strategy_optimization.py
          echo "::endgroup::"
          echo "::group::balls_in_bins_accounting"
          python examples/balls_in_bins_accounting.py
          echo "::endgroup::"
